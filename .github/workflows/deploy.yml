name: Deploy

# CI が main で成功したときだけデプロイする(テストを通ったコミットのみ本番へ)
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# OIDC でロールを assume するために id-token が必要
permissions:
  id-token: write
  contents: read

# 同時デプロイを防ぐ(後発が古いデプロイを上書きしないように待たせる)
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_STACK: gyaru-bot-ecs

jobs:
  # お金に関わる変更(ecs.yaml: Fargate の CPU/メモリ/タスク数、DynamoDB 課金モード、
  # Bedrock モデル ID など)が含まれるかを検査する。モデルは ecs.yaml の BedrockModelId が
  # 単一ソースなので、モデル変更も ecs.yaml の差分として検出される。
  detect:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      cost_change: ${{ steps.detect.outputs.cost_change }}
    steps:
      - name: Checkout the tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - name: Detect cost-related changes
        id: detect
        run: |
          # 直前コミットとの差分に ecs.yaml が含まれれば「お金に関わる変更」とみなす。
          if git diff --name-only HEAD^ HEAD | grep -qx 'ecs.yaml'; then
            echo "cost_change=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ecs.yaml changed — production deploy will require manual approval."
          else
            echo "cost_change=false" >> "$GITHUB_OUTPUT"
          fi

  # cost_change のときだけ走る承認ゲート。required reviewers 付き environment "production" を
  # 通ることで、レビュアー(リポジトリ所有者)の Approve があるまでデプロイを止める。
  approval:
    needs: detect
    if: ${{ needs.detect.outputs.cost_change == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Cost-related change (ecs.yaml) approved by required reviewer."

  deploy:
    needs: [detect, approval]
    # detect 成功が前提。approval は「成功 or スキップ(=コスト変更なし)」なら通す。
    # approval が却下/失敗ならデプロイしない。
    if: >-
      ${{ always()
          && needs.detect.result == 'success'
          && (needs.approval.result == 'success' || needs.approval.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image (linux/amd64)
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          # コミット SHA をタグにして毎回イメージを不変にする。
          # ImageUri が変わることで TaskDefinition も変わり、ECS が自動でローリングする。
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker build --platform linux/amd64 -f Dockerfile.fargate -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy ECS stack (CloudFormation)
        # BedrockModelId は渡さない(ecs.yaml の Default が単一ソース)。お金に関わるモデル変更を
        # ファイル差分として検出・ゲートするため、GitHub 変数ではなく ecs.yaml で管理する。
        run: |
          aws cloudformation deploy \
            --region "$AWS_REGION" \
            --stack-name "$ECS_STACK" \
            --template-file ecs.yaml \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "ImageUri=${{ steps.image.outputs.image_uri }}" \
              "MemoryId=${{ secrets.MEMORY_ID }}" \
              "BedrockRegion=${{ vars.BEDROCK_REGION }}" \
              "VpcId=${{ vars.VPC_ID }}" \
              "SubnetIds=${{ vars.SUBNET_IDS }}"

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --region "$AWS_REGION" \
            --cluster "$ECS_STACK" \
            --services "$ECS_STACK"
