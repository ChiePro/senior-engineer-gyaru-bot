AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  senior-engineer-gyaru-bot (Strands 版) — Slack bot on Lambda(container) + Bedrock + AgentCore Memory.
  ハンドラは slackbot.app_strands.handler。長期記憶は AgentCore Memory(MEMORY_ID)を使う。

Parameters:
  SlackBotToken:
    Type: String
    NoEcho: true
    Description: Slack Bot User OAuth Token (xoxb-...)
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: Slack Signing Secret
  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: Bedrock / AgentCore Memory のリージョン
  BedrockModelId:
    Type: String
    Default: us.amazon.nova-micro-v1:0
    Description: 応答生成に使う Bedrock モデルID
  MemoryId:
    Type: String
    Description: scripts/create_memory.py で作成した AgentCore Memory のID

Globals:
  Function:
    Timeout: 30
    # Strands/AgentCore の import は重い。メモリを増やすと CPU も増え import が速くなる。
    MemorySize: 2048

Resources:
  SlackBotFunction:
    Type: AWS::Serverless::Function
    # FunctionName を固定し、lazy listener の自己 invoke 権限を循環依存なく付与する
    Properties:
      FunctionName: !Sub "${AWS::StackName}-bot"
      PackageType: Image
      Architectures:
        - x86_64
      # コールドスタートで Slack の3秒ルールに間に合わないため、バージョンを発行して
      # エイリアス live に Provisioned Concurrency を1つ張り、常に温めておく。
      AutoPublishAlias: live
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          BEDROCK_REGION: !Ref BedrockRegion
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          MEMORY_ID: !Ref MemoryId
      Policies:
        # 1) Bedrock の応答生成
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
        # 2) lazy listener が自分自身を非同期 invoke するための自己 invoke 権限。
        #    AutoPublishAlias 使用時は alias 修飾された ARN で呼ばれるため :* も許可する。
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !Sub "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-bot"
                - !Sub "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-bot:*"
        # 3) AgentCore Memory の短期/長期メモリ操作(MEMORY_ID に限定)
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:CreateEvent
                - bedrock-agentcore:ListEvents
                - bedrock-agentcore:RetrieveMemoryRecords
              Resource: !Sub "arn:${AWS::Partition}:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/${MemoryId}"
      Events:
        SlackEvents:
          Type: HttpApi
          Properties:
            Path: /slack/events
            Method: POST
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: latest

Outputs:
  SlackRequestUrl:
    Description: Slack の Event Subscriptions に設定する Request URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/slack/events"
  FunctionName:
    Description: デプロイされた Lambda 関数名
    Value: !Ref SlackBotFunction
