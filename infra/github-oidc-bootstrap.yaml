AWSTemplateFormatVersion: "2010-09-09"
Description: >
  GitHub Actions が OIDC で assume するデプロイ用 IAM ロールを作る「1度だけ」のブートストラップ。
  これを先に手動デプロイし、出力された RoleArn を GitHub 変数 AWS_DEPLOY_ROLE_ARN に設定する。

  手動デプロイ例:
    aws cloudformation deploy \
      --template-file infra/github-oidc-bootstrap.yaml \
      --stack-name gyaru-bot-oidc \
      --capabilities CAPABILITY_NAMED_IAM \
      --parameter-overrides GitHubOrg=ChiePro GitHubRepo=senior-engineer-gyaru-bot DeployStackName=gyaru-bot-ecs

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub の org / user 名
  GitHubRepo:
    Type: String
    Description: リポジトリ名
  GitHubBranch:
    Type: String
    Default: main
    Description: デプロイを許可するブランチ
  CreateOIDCProvider:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >
      token.actions.githubusercontent.com の OIDC プロバイダを作成するか。
      アカウントに既に存在する場合は false にする(プロバイダはアカウントに1つだけ)。
  DeployStackName:
    Type: String
    Default: gyaru-bot-ecs
    Description: このロールがデプロイを許可する ECS スタック名(作成される IAM ロール名の絞り込みに使う)

Conditions:
  ShouldCreateProvider: !Equals [!Ref CreateOIDCProvider, "true"]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # GitHub のルート証明書サムプリント(複数あっても可。現在は検証不要だが指定が必要)
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: gha-gyaru-bot-deploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # 指定リポジトリの指定ブランチからの実行だけを許可
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: ecs-container-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudFormation(ECS スタック ecs.yaml の作成・更新)
              - Effect: Allow
                Action: cloudformation:*
                Resource: "*"
              # コンテナイメージの ECR への push(ログイン + リポジトリ操作)
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action: ecr:*
                Resource: "*"
              # ECS(クラスタ/サービス/タスク定義)・ログ・DynamoDB テーブル
              - Effect: Allow
                Action:
                  - ecs:*
                  - logs:*
                  - dynamodb:*
                Resource: "*"
              # EC2: VPC/Subnet 参照とサービス用セキュリティグループの作成・削除
              - Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: "*"
              # ecs.yaml が作る ExecutionRole / TaskRole の管理(スタック名で絞る)
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:ListRoleTags
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${DeployStackName}-*"
              # 作成したロールを ECS タスクに渡す
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${DeployStackName}-*"
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

Outputs:
  RoleArn:
    Description: GitHub 変数 AWS_DEPLOY_ROLE_ARN に設定する値
    Value: !GetAtt DeployRole.Arn
