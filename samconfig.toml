# SAM のデプロイ既定値。秘密情報(Slack トークン等)はここに書かず、
# deploy.yml から --parameter-overrides で渡す。region は workflow 側で指定する。
version = 0.1

[default.global.parameters]
stack_name = "senior-engineer-gyaru-bot"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
# SAM 管理の S3 バケットと ECR リポジトリを自動で用意する(コンテナイメージ関数のため)
resolve_s3 = true
resolve_image_repos = true
